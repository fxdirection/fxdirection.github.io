<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code installation commands</title>
  <desc id="desc">A clean command card for installing Claude Code on Windows, macOS, Linux and WSL.</desc>
  <rect width="1200" height="520" fill="#faf7f2"/>
  <rect x="70" y="58" width="1060" height="404" rx="24" fill="#ffffff" stroke="#eadfd2" stroke-width="2"/>
  <text x="110" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#2f241c">安装 Claude Code</text>
  <text x="110" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6f6155">先安装 CLI，再用 claude --version 验证</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="20">
    <rect x="110" y="190" width="980" height="70" rx="14" fill="#15171c"/>
    <text x="140" y="235" fill="#f6f7fb">PowerShell  irm https://claude.ai/install.ps1 | iex</text>

    <rect x="110" y="282" width="980" height="70" rx="14" fill="#15171c"/>
    <text x="140" y="326" fill="#f6f7fb">CMD         curl -fsSL https://claude.ai/install.cmd -o install.cmd &amp;&amp; install.cmd</text>

    <rect x="110" y="374" width="980" height="52" rx="14" fill="#f0f3f8"/>
    <text x="140" y="407" fill="#39465a">macOS / Linux / WSL: curl -fsSL https://claude.ai/install.sh | bash</text>
  </g>
</svg>
