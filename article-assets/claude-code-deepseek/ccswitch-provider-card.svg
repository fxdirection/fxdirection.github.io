<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">ccSwitch DeepSeek provider configuration</title>
  <desc id="desc">A clean mock configuration panel for adding DeepSeek provider in ccSwitch.</desc>
  <rect width="1200" height="580" fill="#f6f8fb"/>
  <rect x="80" y="56" width="1040" height="468" rx="22" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
  <text x="120" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#172033">ccSwitch 添加 DeepSeek Provider</text>
  <text x="120" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#617188">只写占位密钥，真实 API Key 不截图、不上传</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="140" y="210" font-size="16" font-weight="700" fill="#46556a">Provider Name</text>
    <rect x="140" y="224" width="920" height="44" rx="10" fill="#f8fafc" stroke="#ccd6e4"/>
    <text x="160" y="253" font-size="17" fill="#1f2937">DeepSeek V4 Pro</text>

    <text x="140" y="304" font-size="16" font-weight="700" fill="#46556a">Base URL</text>
    <rect x="140" y="318" width="920" height="44" rx="10" fill="#f8fafc" stroke="#ccd6e4"/>
    <text x="160" y="347" font-size="17" fill="#1f2937">https://api.deepseek.com/anthropic</text>

    <text x="140" y="398" font-size="16" font-weight="700" fill="#46556a">Models</text>
    <rect x="140" y="412" width="430" height="48" rx="12" fill="#eefaf3" stroke="#b9e2c7"/>
    <text x="164" y="443" font-size="17" fill="#1d5f37">deepseek-v4-pro</text>
    <rect x="630" y="412" width="430" height="48" rx="12" fill="#eef6ff" stroke="#bdd7f0"/>
    <text x="654" y="443" font-size="17" fill="#17436c">deepseek-v4-flash</text>
  </g>
</svg>
